name: Label PR

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  label:
    name: Auto-label Claude Code PRs
    runs-on: ubuntu-latest
    steps:
      - name: Check for Claude Code signature and apply labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.pull_request.body || '';
            const isClaude = body.includes('Generated by Claude Code');

            if (isClaude) {
              // Apply ai-generated and claude-code labels
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['ai-generated', 'claude-code'],
              });

              // Request Copilot review
              try {
                await github.rest.pulls.requestReviewers({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                  reviewers: ['copilot-pull-request-reviewer'],
                });
              } catch (e) {
                // Copilot reviewer may not be available — skip silently
                core.info('Copilot reviewer not available: ' + e.message);
              }

              core.info('Applied ai-generated and claude-code labels.');
            }

      - name: Label by changed paths
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false
        continue-on-error: true
