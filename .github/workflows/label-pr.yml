name: Label PR

on:
  pull_request:
    types: [opened, synchronize, edited]

permissions:
  pull-requests: write
  contents: read

jobs:
  copilot-review:
    name: Request Copilot Review
    runs-on: ubuntu-latest
    # Only on PR open (not every push)
    if: github.event.action == 'opened'
    steps:
      - name: Request Copilot as reviewer
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: ['copilot-pull-request-reviewer'],
              });
              core.info('Copilot review requested.');
            } catch (e) {
              core.warning('Copilot reviewer not available: ' + e.message);
            }

  label:
    name: Auto-label PRs
    runs-on: ubuntu-latest
    steps:
      - name: Apply Claude Code labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.pull_request.body || '';
            if (body.includes('Generated by Claude Code')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['ai-generated', 'claude-code'],
              });
              core.info('Applied ai-generated and claude-code labels.');
            }

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Label by changed paths
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false
        continue-on-error: true
